services:
  pii-deid:
    build: .
    ports:
      - "8000:8000"
    environment:
      - X_API_KEY=${X_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
